welcome:
  body: |
    ## Welcome!

    Thank you for taking part in this study on **creativity in soccer**. Here is an overview of what to expect:

    ### Steps:

    1. **Login**: Indicate whether you have participated before
    2. **Questionnaire**: New participants complete a brief background questionnaire
    3. **Familiarization**: Go through a few practice clips to get used to the rating interface
    4. **Rating**: Watch short soccer action clips and rate each one on several dimensions

    ### Important Notes:

    - Please complete ratings in a quiet environment without distractions
    - All data is anonymized using a generated participant ID — no personal information is stored
    - You can take breaks between clips; your progress is saved automatically

    ---

    **Ready to begin?** Click the button below to proceed.

pre_familiarization:
  body: |
    ### Instructions — Please read carefully!

    You will be shown a series of short video clips of soccer actions. For each clip, you will be asked to rate the action on the following dimensions:

    - **Creativity**: How creative was this action? (1 = not creative at all, 7 = extremely creative)
    - **Technical Correctness**: How technically correct was the execution? (1 = not technically correct, 7 = very technically correct)
    - **Aesthetic Appeal**: How aesthetically appealing was the action? (1 = not appealing, 7 = very appealing)

    #### Tips for rating creativity:

    A soccer action can be considered creative if it is **novel, surprising, or unexpected** given the game situation — yet still **effective or intentional**. Pure technical excellence alone does not make an action creative; creativity involves an element of originality or ingenuity.

    You may re-watch each clip as many times as you like before submitting your ratings.

    We will now start with **3 practice clips** so you can familiarise yourself with the interface. Press **Start** below to begin the practice.

post_familiarization:
  success_message: |
    ### Well done!

    You have completed the practice trials and should now be comfortable with the rating interface.
  body: |
    The main rating task will now begin.

    You will see a series of soccer action clips. For each clip, please rate it on **creativity**, **technical correctness**, and **aesthetic appeal** using the 1–7 scales provided.

    Take your time, re-watch clips as needed, and try to be as accurate as possible. There are no right or wrong answers — we are interested in your personal perception.

    Good luck and thank you for your contribution!

completion:
  heading: "All Done!"
  body: |
    ### Thank you for your participation!

    You have finished rating all available clips.

    Your responses have been saved and will contribute to our research on creativity in soccer.
